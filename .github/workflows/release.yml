# .github/workflows/release.yml
#
# Se activa cuando haces push de un tag v*.*.*
#   git tag v1.1.0
#   git push origin v1.1.0
#
# Publica en el mismo release:
#   · NovaDL_Portable_vX.X.X.zip
#   · NovaDL_Setup_vX.X.X.exe  (via Inno Setup)

name: Build & Release Windows

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Código ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencias ────────────────────────────────────────────────────
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pillow requests pyinstaller psutil
          pip install plyer win10toast
          pip install tkinterdnd2

      # ── 4. Inno Setup ──────────────────────────────────────────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

      # ── 5. Compilar PyInstaller ────────────────────────────────────────────
      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --icon assets/icon.ico `
            --name NovaDL `
            --add-data "core;core" `
            --add-data "ui;ui" `
            --add-data "assets;assets" `
            --hidden-import psutil `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            main.py

      # ── 6. Verificar .exe ──────────────────────────────────────────────────
      - name: Verify executable
        shell: pwsh
        run: |
          if (!(Test-Path "dist\NovaDL.exe")) {
            Write-Error "dist\NovaDL.exe no encontrado"
            exit 1
          }
          $mb = [math]::Round((Get-Item "dist\NovaDL.exe").Length / 1MB, 1)
          Write-Host "NovaDL.exe OK ($mb MB)"

      # ── 7. Preparar bin y descargar yt-dlp / ffmpeg ───────────────────────
      - name: Prepare bin folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist\bin" | Out-Null

      - name: Download yt-dlp
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "dist\bin\yt-dlp.exe"

          if (!(Test-Path "dist\bin\yt-dlp.exe")) {
            Write-Error "No se pudo descargar yt-dlp.exe"
            exit 1
          }

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          $extract = "$env:RUNNER_TEMP\ffmpeg_extract"

          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile $zip

          Expand-Archive -Path $zip -DestinationPath $extract -Force

          $binPath = Get-ChildItem -Path $extract -Directory -Recurse |
            Where-Object { $_.Name -eq "bin" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $binPath) {
            Write-Error "No se encontró la carpeta bin de FFmpeg"
            exit 1
          }

          Copy-Item "$binPath\ffmpeg.exe"  "dist\bin\ffmpeg.exe"  -Force
          Copy-Item "$binPath\ffplay.exe"  "dist\bin\ffplay.exe"  -Force
          Copy-Item "$binPath\ffprobe.exe" "dist\bin\ffprobe.exe" -Force

          if (!(Test-Path "dist\bin\ffmpeg.exe"))  { Write-Error "ffmpeg.exe no encontrado"; exit 1 }
          if (!(Test-Path "dist\bin\ffplay.exe"))  { Write-Error "ffplay.exe no encontrado"; exit 1 }
          if (!(Test-Path "dist\bin\ffprobe.exe")) { Write-Error "ffprobe.exe no encontrado"; exit 1 }

      - name: Verify bin tools
        shell: pwsh
        run: |
          Get-ChildItem "dist\bin" | Select-Object Name, Length

      # ── 8. Portable ZIP ────────────────────────────────────────────────────
      - name: Package portable ZIP
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $zip     = "NovaDL_Portable_v$version.zip"

          if (Test-Path "pkg") {
            Remove-Item "pkg" -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path "pkg\NovaDL" | Out-Null
          Copy-Item "dist\NovaDL.exe" "pkg\NovaDL\NovaDL.exe" -Force
          Copy-Item "dist\bin" "pkg\NovaDL\bin" -Recurse -Force
          if (Test-Path "README.md") { Copy-Item "README.md" "pkg\NovaDL\" -Force }

          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          Compress-Archive -Path "pkg\NovaDL\*" -DestinationPath $zip -Force
          Write-Host "Portable ZIP: $zip"
          echo "PORTABLE_ZIP=$zip" >> $env:GITHUB_ENV

      # ── 9. Instalador Inno Setup ───────────────────────────────────────────
      - name: Build installer
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")

          if (!(Test-Path "NovaDL.iss")) {
            Write-Error "NovaDL.iss no encontrado"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path "installer" | Out-Null

          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            Write-Error "ISCC.exe no encontrado"
            exit 1
          }

          & $iscc "NovaDL.iss"

          $setup = Get-ChildItem "installer\*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($setup) {
            $target = "installer\NovaDL_Setup_v$version.exe"
            if (Test-Path $target) {
              Remove-Item $target -Force
            }
            Rename-Item $setup.FullName $target -Force
            Write-Host "Installer: NovaDL_Setup_v$version.exe"
            echo "INSTALLER_EXE=$target" >> $env:GITHUB_ENV
          } else {
            Write-Error "El instalador no se generó"
            exit 1
          }

      # ── 10. Generar release notes ──────────────────────────────────────────
      - name: Generate release notes
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $date    = (Get-Date).ToString("yyyy-MM-dd")

          $notes = @"
          ## NovaDL $version — $date

          ### Descarga
          | Archivo | Descripción |
          |---------|-------------|
          | ``NovaDL_Setup_v$version.exe`` | **Instalador** — recomendado para la mayoría de usuarios |
          | ``NovaDL_Portable_v$version.zip`` | **Portable** — extrae y ejecuta, sin instalar |

          ### Incluye
          - ``NovaDL.exe``
          - ``yt-dlp.exe``
          - ``ffmpeg.exe``
          - ``ffplay.exe``
          - ``ffprobe.exe``

          ### Instalador
          - Instala en ``C:\Program Files\NovaDL\``
          - Crea acceso directo en escritorio y menú inicio (opcional)
          - Inicio automático con Windows (opcional)
          - Asociación de archivos ``.txt`` de enlaces (opcional)
          - Desinstalación limpia desde "Agregar o quitar programas"

          ### Portable
          - Extrae el ZIP y ejecuta ``NovaDL.exe``
          - Las herramientas necesarias ya vienen incluidas en ``bin\``

          ### Requisitos
          - Windows 10 / 11 (x64)

          ---
          *Build generado automáticamente por GitHub Actions*
          "@

          $lines = $notes -split "`n"
          $clean = ($lines | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content "RELEASE_NOTES.md" $clean
          Write-Host "Release notes generadas"

      # ── 11. Publicar release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "NovaDL ${{ github.ref_name }}"
          body_path:  RELEASE_NOTES.md
          draft:      false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            ${{ env.PORTABLE_ZIP }}
            ${{ env.INSTALLER_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
